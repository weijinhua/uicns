services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: charts
      POSTGRES_PASSWORD: charts
      POSTGRES_DB: charts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_minio_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      CORS_ORIGIN: "http://localhost:3000"
      DATABASE_URL: "postgresql://charts:charts@postgres:5432/charts"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRES_IN: "7d"
      S3_ENDPOINT: "http://minio:9000"
      S3_REGION: "us-east-1"
      S3_BUCKET: "charts-exports"
      S3_ACCESS_KEY: "minio"
      S3_SECRET_KEY: "minio_minio_minio"
      LLM_API_KEY: "placeholder"
    depends_on:
      - postgres
      - minio

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  pgdata:
  minio:
